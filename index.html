<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050505;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Courier New',monospace;padding:12px;color:#ccc}
.tv{width:100%;max-width:920px;background:#0c0c0c;border-radius:14px;overflow:hidden;border:1px solid #1c1c1c}
.tv-header{background:#111;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1e1e}
.logo{font-size:20px;font-weight:700;letter-spacing:0.12em;color:#00ff88}.logo span{color:#fff}
.hdr-right{font-size:10px;color:#333;letter-spacing:0.06em}
.screen-wrap{background:#111;padding:12px 12px 0}
.screen{background:#000;border-radius:8px;overflow:hidden;position:relative;width:100%;aspect-ratio:16/9;min-height:200px}
.screen iframe{width:100%;height:100%;display:block;border:none}
.scanline{position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);pointer-events:none;z-index:3;border-radius:8px}
.loader{position:absolute;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.ld-num{font-size:64px;font-weight:700;color:#fff;letter-spacing:0.05em;line-height:1}
.ld-name{font-size:15px;color:#00ff88;letter-spacing:0.18em;margin:8px 0 20px;text-align:center;padding:0 20px}
.ld-bar-wrap{width:180px;height:2px;background:rgba(255,255,255,0.1);border-radius:1px}
.ld-bar{height:100%;background:#00ff88;border-radius:1px;width:0;transition:width 1.5s ease}
.osd{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:4;display:flex;flex-direction:column;justify-content:space-between;padding:10px}
.osd-top{display:flex;justify-content:space-between}
.ch-badge{font-size:12px;color:#00ff88;background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.25);padding:3px 10px;border-radius:3px;letter-spacing:0.1em}
.osd-clock{font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:0.05em}
.osd-bottom{display:flex;justify-content:space-between;align-items:center}
.np-short{font-size:10px;color:rgba(255,255,255,0.4);max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.on-air{font-size:9px;color:#00ff88;letter-spacing:0.08em;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.controls{background:#161616;padding:10px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-top:1px solid #1e1e1e}
.btn{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:5px;color:#999;font-family:'Courier New',monospace;font-size:11px;padding:7px 13px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:#282828;color:#fff;border-color:#444}
.btn:active{transform:scale(0.97)}
.btn-g{background:rgba(0,255,136,0.07);border-color:rgba(0,255,136,0.25);color:#00ff88}
.btn-g:hover{background:rgba(0,255,136,0.14)}
.np-bar{background:#0f0f0f;padding:7px 14px;border-top:1px solid #181818;display:flex;align-items:center;gap:10px}
.np-ico{font-size:10px;color:#00ff88;letter-spacing:0.06em;white-space:nowrap}
.np-full{font-size:11px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.np-cycle{font-size:10px;color:#2a2a2a;white-space:nowrap}
.ch-grid{background:#0a0a0a;padding:10px 12px 14px;display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
@media(max-width:580px){.ch-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:360px){.ch-grid{grid-template-columns:repeat(3,1fr)}}
.ch-btn{background:#141414;border:1px solid #202020;border-radius:7px;padding:8px 5px;cursor:pointer;text-align:left;transition:all 0.15s;display:flex;flex-direction:column;gap:2px}
.ch-btn:hover{background:#1c1c1c;border-color:#333}

// Seeded shuffle — same order per channel per day for all viewers
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed >>> 0;
  for (let i = a.length - 1; i > 0; i--) {
    s = Math.imul(s ^ s >>> 15, s | 1);
    s ^= s + Math.imul(s ^ s >>> 7, s | 61);
    s = (s ^ s >>> 14) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Get which video is "live" now + start offset
function getStream(ch) {
  const dayNum = Math.floor(Date.now() / 86400000);
  const seed = ch.num.charCodeAt(0) * 997 + ch.num.charCodeAt(1) * 31 + dayNum;
  const list = seededShuffle(ch.videos, seed);
  const total = list.reduce((s, v) => s + v.dur, 0);
  const secNow = Math.floor((Date.now() % 86400000) / 1000);
  const pos = secNow % total;
  let acc = 0;
  for (let i = 0; i < list.length; i++) {
    if (pos < acc + list[i].dur) {
      return { list, idx: i, offset: pos - acc, total };
    }
    acc += list[i].dur;
  }
  return { list, idx: 0, offset: 0, total };
}

// Build YouTube embed URL with start time
function buildSrc(video, offset) {
  const start = Math.max(0, Math.floor(offset));
  if (video.playlist) {
    return `https://www.youtube.com/embed/videoseries?list=${video.id}&autoplay=1&start=${start}&mute=0`;
  }
  return `https://www.youtube.com/embed/${video.id}?autoplay=1&start=${start}&rel=0&modestbranding=1`;
}

let currentCh = 0;

function switchChannel(idx) {
  currentCh = idx;
  const ch = channels[idx];

  document.getElementById('badge').textContent = 'CH ' + ch.num;
  document.getElementById('footerInfo').textContent = 'CH ' + ch.num + ' — ' + ch.name;
  document.querySelectorAll('.ch-btn').forEach((b, i) => b.classList.toggle('active', i === idx));

  // Show loader
  const loader = document.getElementById('loader');
  document.getElementById('ldNum').textContent = ch.num;
  document.getElementById('ldName').textContent = ch.name;
  loader.style.display = 'flex';
  const bar = document.getElementById('ldBar');
  bar.style.width = '0';
  setTimeout(() => bar.style.width = '100%', 50);

  // Clear iframe first to stop previous video
  document.getElementById('player').src = '';

  setTimeout(() => {
    loader.style.display = 'none';
    const stream = getStream(ch);
    const vid = stream.list[stream.idx];
    document.getElementById('player').src = buildSrc(vid, stream.offset);
    updateNP(vid, stream);
  }, 1600);
}

function updateNP(vid, stream) {
  document.getElementById('npShort').textContent = vid.title;
  document.getElementById('npFull').textContent = vid.title;
  const h = Math.round(stream.total / 3600);
  document.getElementById('npCycle').textContent = 'CYCLE ~' + h + 'h';
}

function buildGrid() {
  const grid = document.getElementById('chGrid');
  channels.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<div class="ch-ico">${ch.icon}</div><div class="ch-num">CH ${ch.num}</div><div class="ch-name">${ch.name}</div>`;
    btn.onclick = () => switchChannel(i);
    grid.appendChild(btn);
  });
}

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(), n.getMinutes()].map(x => String(x).padStart(2,'0')).join(':');
}

document.getElementById('prevBtn').onclick = () =>
  switchChannel((currentCh - 1 + channels.length) % channels.length);
document.getElementById('nextBtn').onclick = () =>
  switchChannel((currentCh + 1) % channels.length);
document.getElementById('fsBtn').onclick = () => {
  const s = document.getElementById('screen');
  if (s.requestFullscreen) s.requestFullscreen();
  else if (s.webkitRequestFullscreen) s.webkitRequestFullscreen();
};

buildGrid();
setInterval(updateClock, 1000);
updateClock();
switchChannel(0);
</script>
