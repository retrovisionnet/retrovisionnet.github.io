<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>RetroVision TV Network - 24/7 Vintage TV Simulator</title>
    <meta name="description" content="Experience nostalgia with RetroVision TV Network. Stream 24/7 vintage cartoons, 80s MTV broadcasts, retro horror, classic sitcoms, and deep ocean relaxation.">
    <meta name="keywords" content="retro tv simulator, vintage tv, 80s mtv, 90s cartoons, classic cartoons, retro vision, old school television">
    <meta name="author" content="RetroVision Net">
    <link rel="canonical" href="https://retrovisionnet.github.io/" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0a0a0a; color: #00ff66; font-family: 'Courier New', monospace; 
            padding: 15px; display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; min-height: 100vh; overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 15px; width: 100%; max-width: 1250px; }
        header h1 { font-size: 24px; text-shadow: 0 0 10px rgba(0, 255, 102, 0.6); letter-spacing: 2px; }
        header p { color: #888; font-size: 12px; margin-top: 5px; }

        .tv-container { 
            display: grid; grid-template-columns: 1fr 320px; gap: 20px; 
            width: 100%; max-width: 1250px; background: #111; padding: 20px; 
            border: 3px solid #333; border-radius: 8px; box-shadow: inset 0 0 40px #000;
        }

        .panel-main { display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        .screen-container { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #000; border: 4px solid #222; border-radius: 4px; overflow: hidden; 
        }
        
        /* STYLISH UNMUTE OVERLAY BLOCK */
        .unmute-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: #00ff66; font-weight: bold; font-size: 18px;
            text-shadow: 0 0 8px #00ff66; border: 2px dashed #00ff66; margin: auto;
        }
        .unmute-overlay span { background: #000; padding: 10px 20px; border-radius: 4px; animation: pulse 1.5s infinite; }

        .screen-engine { width: 100%; height: 100%; border: none; display: block; }

        .info-panel { 
            background: #151515; padding: 12px; border: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }
        #nowPlaying { color: #fff; font-weight: bold; }
        .static-noise { color: #ff0055; animation: blink 2s infinite; }

        .panel-side { display: flex; flex-direction: column; gap: 8px; }
        .btn-ch { 
            background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 10px; 
            text-align: left; cursor: pointer; font-family: inherit; font-size: 12px; 
            border-radius: 4px; transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .btn-ch:hover { background: #252525; color: #00ff66; border-color: #00ff66; }
        .btn-ch.active { background: #002208; color: #00ff66; border-color: #00ff66; font-weight: bold; box-shadow: inset 0 0 10px rgba(0,255,102,0.2); }

        footer { margin-top: 20px; font-size: 11px; color: #555; text-align: center; }
        footer a { color: #555; text-decoration: none; margin: 0 10px; transition: color 0.2s; }
        footer a:hover { color: #00ff66; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        @media (max-width: 900px) {
            .tv-container { grid-template-columns: 1fr; }
            .panel-side { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>RETROVISION NETWORKS</h1>
        <p>BROADCAST TERMINAL v2.5 // LIVE SIMULATION ARCHIVE</p>
    </header>

    <div class="tv-container">
        
        <div class="panel-main">
            <div class="screen-container" id="tv_frame_container">
                
                <div class="unmute-overlay" id="unmuteOverlay" onclick="unmuteTelevision()">
                    <span>🔊 CLICK TO UNMUTE LIVE BROADCAST</span>
                </div>
                
                <iframe id="yt_embed_player" class="screen-engine" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&iv_load_policy=3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            
            </div>
            
            <div class="info-panel">
                <div id="nowPlaying">CH 01: GOLDEN AGE TOONS</div>
                <div class="static-noise" id="videoStatus">SIGNAL LOCK: STREAM LIVE (MUTED)</div>
            </div>
        </div>

        <div class="panel-side">
            <button class="btn-ch active" onclick="switchChannel(0)">CH 01: GOLDEN AGE TOONS</button>
            <button class="btn-ch" onclick="switchChannel(1)">CH 02: CARTOON VAULT</button>
            <button class="btn-ch" onclick="switchChannel(2)">CH 03: FAMILY RETRO</button>
            <button class="btn-ch" onclick="switchChannel(3)">CH 04: MTV 80s</button>
            <button class="btn-ch" onclick="switchChannel(4)">CH 05: MTV 90s ALTERNATIVE</button>
            <button class="btn-ch" onclick="switchChannel(5)">CH 06: CLASSIC SITCOMS</button>
            <button class="btn-ch" onclick="switchChannel(6)">CH 07: MIDNIGHT HORROR</button>
            <button class="btn-ch" onclick="switchChannel(7)">CH 08: DRIVE-IN THEATER</button>
            <button class="btn-ch" onclick="switchChannel(8)">CH 09: MYSTERY TV</button>
            <button class="btn-ch" onclick="switchChannel(9)">CH 10: TRUE CRIME</button>
            <button class="btn-ch" onclick="switchChannel(10)">CH 11: RETRO ACTION</button>
            <button class="btn-ch" onclick="switchChannel(11)">CH 12: DEEP OCEAN RELAX 🔥</button>
        </div>

    </div>

    <footer>
        &copy; 2026 RetroVision TV Network. All historical logs indexed. 
        <a href="privacy.html">Privacy Policy</a> | 
        <a href="dmca.html">DMCA Copyright Notices</a>
    </footer>

    <script src="tv_engine.js"></script>
</body>
</html>
